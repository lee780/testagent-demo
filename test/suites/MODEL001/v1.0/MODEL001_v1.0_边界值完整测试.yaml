# MODEL_001 授信额度测算 v1.0 - 边界值完整测试用例
# 覆盖 DB 条件的 2 个准入 + 系数三档边界值
# 当前系统实际实现规则（仅 DB 条件）

suite:
  id: SUITE_MODEL001_V1_BOUNDARY
  name: "MODEL_001 v1.0 授信额度测算 - 边界值分析测试"
  model_id: MODEL_001
  endpoint: /mock/model/score
  method: POST
  content_type: application/xml

test_cases:

  # ────────── PART A: 月薪边界值 (>10000) ───────────────────

  - id: TC_M001_A01
    name: "A01-月薪临界下界 -9999(不准入)"
    category: 边界值
    priority: P0
    coverage_point: "边界值/月薪/下界 -9999(不满足>10000)"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_A01"
          user_level: 3
        account_balance:
          user_id: "TC_A01"
          avg_3m_balance: 5000
        cgs_social_security:
          user_id: "TC_A01"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_A01"
          monthly_salary: 9999
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_A01</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params><sx_trace_id>TRACE_A01</sx_trace_id><person_name>测试用户 A01</person_name></business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
      - path: "//admit_flag"
        op: eq
        value: "0"
        desc: "月薪 9999 不大于 10000，不准入"
      - path: "//credit_limit"
        op: eq
        value: "0.00"
    notes: "边界值：月薪=9999(临界点下方)"

  - id: TC_M001_A02
    name: "A02-月薪临界值 -10000(不准入，等于不行)"
    priority: P0
    coverage_point: "边界值/月薪/临界点 -10000(等于不满足>)"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_A02"
          user_level: 3
        account_balance:
          user_id: "TC_A02"
          avg_3m_balance: 5000
        cgs_social_security:
          user_id: "TC_A02"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_A02"
          monthly_salary: 10000
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_A02</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params><sx_trace_id>TRACE_A02</sx_trace_id><person_name>测试用户 A02</person_name></business_params>
        </REQUEST>
