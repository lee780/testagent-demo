        value: "0"
        desc: "月薪=10000 不满足>10000 的条件"
      - path: "//credit_limit"
        op: eq
        value: "0.00"
    notes: "边界值：月薪=10000(等于门槛仍不准入)"

  - id: TC_M001_A03
    name: "A03-月薪刚过门槛 -10001(准入)"
    priority: P0
    coverage_point: "边界值/月薪/上界 -10001(刚刚满足>)"
    preconditions:
      db_setup:
        user_info:
