# MODEL_001 授信额度测算 — 完整接口测试用例
# 基于等价类划分和边界值分析生成
# 覆盖所有因子组合：user_level × monthly_salary × social_security_flag × avg_3m_balance

suite:
  id: SUITE_MODEL001_COMPLETE
  name: MODEL_001 授信额度模型完整测试
  model_id: MODEL_001
  endpoint: /mock/model/score
  method: POST
  content_type: application/xml

test_cases:

  # ════════════════════════════════════════════════════════════
  # S01: 正常流程 - 基础准入场景
  # ════════════════════════════════════════════════════════════
  
  - id: TC_MODEL001_S01
    name: "正常准入 - 正资产 - 系数 2.3"
    category: 正常流程
    priority: P0
    coverage_point: "决策规则覆盖/准入条件/满足准入 - 正资产系数 2.3"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S01"
          user_level: 3
        account_balance:
          user_id: "TC_S01"
          avg_3m_balance: 5000.00
        cgs_social_security:
          user_id: "TC_S01"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_S01"
          monthly_salary: 15000.00
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S01</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S01</sx_trace_id>
            <corp_id></corp_id>
            <corp_xy_num></corp_xy_num>
            <person_idtype>1010</person_idtype>
            <person_id></person_id>
            <person_name>测试用户</person_name>
            <bnk_no></bnk_no>
            <cp_code>8890</cp_code>
            <c_code>110110</c_code>
            <p_code>110000</p_code>
            <fr_psn_id></fr_psn_id>
            <fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "1"
        desc: 准入（工资 15000>10000 且 有社保）
      - path: "//credit_limit"
        op: eq
        value: "517500.00"
        desc: "额度=3×(5000÷1000)×15000×2.3=517500.00"
    notes: "核心正常流程：准入 + 正资产 + 系数 2.3"

  - id: TC_MODEL001_S01_VARIANT
    name: "正常准入 - 高资产高薪资 - 大额授信"
