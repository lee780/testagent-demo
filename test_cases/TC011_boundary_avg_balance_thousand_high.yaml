# 近3月均余额边界值测试 - 刚好大于1000
test_case_id: TC011
description: "近3月均余额刚好大于1000，应使用系数2.3"
setup:
  userId: "test_011"
  userLevel: 2
  avg3mBalance: 1000.01  # 边界值
  socialSecurityFlag: 1
  monthlySalary: 15000
  external_setup:
    card_status: "NORMAL"
    recent_trans_amount: 5800
    id_check_result: "PASS"
    is_black: false
request:
  url: "/mock/model/score"
  method: "POST"
  headers:
    Content-Type: "application/xml"
  body: |
    <REQUEST>
      <user_id>test_011</user_id>
    </REQUEST>
assertions:
  - type: "equals"
    expression: "result_code"
    expected: "0000"
  - type: "equals"
    expression: "admit_flag"
    expected: "1"  # 应该准入
  - type: "equals"
    expression: "credit_limit"
    expected: "6900069.00"  # 2 * 1000.01 * 15000 * 2.3 = 69,000,690