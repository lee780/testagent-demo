# 近3月均余额边界值测试 - 等于1000
test_case_id: TC010
description: "近3月均余额等于1000，应使用系数0.5"
setup:
  userId: "test_010"
  userLevel: 2
  avg3mBalance: 1000  # 边界值
  socialSecurityFlag: 1
  monthlySalary: 15000
  external_setup:
    card_status: "NORMAL"
    recent_trans_amount: 5800
    id_check_result: "PASS"
    is_black: false
request:
  url: "/mock/model/score"
  method: "POST"
  headers:
    Content-Type: "application/xml"
  body: |
    <REQUEST>
      <user_id>test_010</user_id>
    </REQUEST>
assertions:
  - type: "equals"
    expression: "result_code"
    expected: "0000"
  - type: "equals"
    expression: "admit_flag"
    expected: "1"  # 应该准入
  - type: "equals"
    expression: "credit_limit"
    expected: "15000000.00"  # 2 * 1000 * 15000 * 0.5 = 15,000,000