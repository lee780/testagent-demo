# 黑名单边界值测试
test_case_id: TC006
description: "用户在黑名单中，应拒绝准入"
setup:
  userId: "test_006"
  userLevel: 2
  avg3mBalance: 1500
  socialSecurityFlag: 1
  monthlySalary: 15000
  external_setup:
    card_status: "NORMAL"
    recent_trans_amount: 5800
    id_check_result: "PASS"
    is_black: true  # 边界值
request:
  url: "/mock/model/score"
  method: "POST"
  headers:
    Content-Type: "application/xml"
  body: |
    <REQUEST>
      <user_id>test_006</user_id>
    </REQUEST>
assertions:
  - type: "equals"
    expression: "result_code"
    expected: "0000"
  - type: "equals"
    expression: "admit_flag"
    expected: "0"  # 应该被拒绝