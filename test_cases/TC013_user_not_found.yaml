# 用户不存在测试案例
test_case_id: TC013
description: "用户数据不存在，应返回错误码0001"
setup:
  userId: "non_existent_user"
  # 不设置任何数据
request:
  url: "/mock/model/score"
  method: "POST"
  headers:
    Content-Type: "application/xml"
  body: |
    <REQUEST>
      <user_id>non_existent_user</user_id>
    </REQUEST>
assertions:
  - type: "equals"
    expression: "result_code"
    expected: "0001"  # 用户数据不存在