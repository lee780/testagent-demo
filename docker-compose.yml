# TestAgent-PI Docker Compose
# 前端: 39999 → nginx:80, 后端: 39998 → fastify:8000
# 复用已有的 PostgreSQL (testagent-postgres) 和 Redis (mcp-autotest-redis)，均在 client_default 网络

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: testagent-pi-server
    restart: unless-stopped
    ports:
      - "39996:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://mcp_user:mcp_password@postgres:5432/testagent?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-production}
      CORS_ORIGINS: "*"
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen3.5-35b-a3b}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      STORAGE_ROOT: /app/storage
      WORKSPACE_DIR: /app/.testagent/workspace
      AGENT_OUTPUT_DIR: /app/.testagent/workspace/outputs
    volumes:
      - server_storage:/app/storage
      - server_workspace:/app/.testagent
    networks:
      - pi-network
      - client_default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: testagent-pi-frontend
    restart: unless-stopped
    ports:
      - "39997:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - pi-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  server_storage:
    driver: local
  server_workspace:
    driver: local

networks:
  pi-network:
    driver: bridge
  client_default:
    external: true
