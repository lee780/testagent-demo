# 接口测试用例参考格式
# 说明：Agent 生成测试用例时必须严格参照此模板
#
# ★ 必填字段说明：
#   coverage_point  — 追溯到思维导图叶子节点路径，格式："一级/二级/三级/具体覆盖点"
#                     例："等价类/用户等级/有效类/等级1（最低）"
#   category        — 正常流程 / 边界值 / 等价类 / 异常流程
#   priority        — P0（核心）/ P1（重要）/ P2（一般）

suite:
  id: SUITE_{ModelId}
  name: "{ModelId} 接口测试"
  model_id: "{ModelId}"
  endpoint: /mock/model/score
  method: POST
  content_type: application/xml

test_cases:

  - id: TC_{ModelId}_S01
    name: "用例名称（简洁描述场景）"
    category: 正常流程
    priority: P0
    coverage_point: "等价类/参数名/有效类/具体值"   # ← 必填，指向思维导图节点
    preconditions:
      db_setup:
        user_info:
          user_id: ""
          user_level: 0          # 1~5
        account_balance:
          user_id: ""
          avg_3m_balance: 0      # decimal，可为负
        cgs_social_security:
          user_id: ""
          social_security_flag: 0  # 0=无社保 / 1=有社保
        salary_summary:
          user_id: ""
          monthly_salary: 0      # decimal，范围 1~10000000
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id></user_id>
          <model_id>{ModelId}</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id></sx_trace_id>
            <corp_id></corp_id>
            <corp_xy_num></corp_xy_num>
            <person_idtype>1010</person_idtype>
            <person_id></person_id>
            <person_name>测试用户</person_name>
            <bnk_no></bnk_no>
            <cp_code>8890</cp_code>
            <c_code>110110</c_code>
            <p_code>110000</p_code>
            <fr_psn_id></fr_psn_id>
            <fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "1"
        desc: 预期准入标志
      - path: "//credit_limit"
        op: eq
        value: "0.00"
        desc: 预期额度值（公式：user_level × avg_3m_balance÷1000 × monthly_salary × coefficient）
    notes: "用例说明：覆盖了xxx场景，验证xxx规则"
