# MODEL_001 授信额度测算 — 接口测试用例样例
# 说明：此文件为 3 条示范用例，覆盖核心场景。Agent 需以此格式生成全量因子组合用例。
#
# ★ 与系统的关键匹配点：
#   - endpoint: /mock/model/score（被测系统真实地址）
#   - preconditions.db_setup 字段名必须与下方保持一致
#   - assertions.path 使用 //tag 格式提取 XML 响应值
#   - credit_limit 公式：user_level × (avg_3m_balance÷1000) × monthly_salary × coefficient
#   - coefficient：准入且balance>0→2.3；准入且balance≤0→0.5；不准入→0
#
# ★ 追溯字段说明：
#   - coverage_point：必填，指向思维导图叶子节点路径，格式为"一级/二级/三级/具体覆盖点"
#     例：coverage_point: "等价类/月均余额/有效类/正数余额"
#     此字段用于测试报告中的设计追溯表，证明每条用例来自明确的测试设计决策

suite:
  id: SUITE_MODEL001
  name: MODEL_001 授信额度模型接口测试
  model_id: MODEL_001
  endpoint: /mock/model/score
  method: POST
  content_type: application/xml

test_cases:

  # ── 用例1：正常准入，正资产，系数2.3 ─────────────────────────────────
  - id: TC_MODEL001_S01
    name: "正常准入-正资产-系数2.3"
    category: 正常流程
    priority: P0
    coverage_point: "决策规则覆盖/准入条件/满足准入-正资产系数2.3"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S01"
          user_level: 3              # 合法范围 1~5
        account_balance:
          user_id: "TC_S01"
          avg_3m_balance: 5000.00   # 正数，系数取 2.3
        cgs_social_security:
          user_id: "TC_S01"
          social_security_flag: 1   # 有社保
        salary_summary:
          user_id: "TC_S01"
          monthly_salary: 15000.00  # >10000，满足准入
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S01</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S01</sx_trace_id>
            <corp_id></corp_id>
            <corp_xy_num></corp_xy_num>
            <person_idtype>1010</person_idtype>
            <person_id></person_id>
            <person_name>测试用户</person_name>
            <bnk_no></bnk_no>
            <cp_code>8890</cp_code>
            <c_code>110110</c_code>
            <p_code>110000</p_code>
            <fr_psn_id></fr_psn_id>
            <fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "1"
        desc: 准入（工资15000>10000 且 有社保）
      - path: "//credit_limit"
        op: eq
        value: "517500.00"
        desc: "额度=3×(5000÷1000)×15000×2.3=517500.00"
    notes: "核心正常流程：准入 + 正资产 + 系数2.3"

  # ── 用例2：准入，负资产，额度归零 ────────────────────────────────────
  - id: TC_MODEL001_S02
    name: "准入-负资产-额度归零"
    category: 边界值
    priority: P0
    coverage_point: "风险区域/负余额×系数计算/准入但负资产额度归零"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S02"
          user_level: 1
        account_balance:
          user_id: "TC_S02"
          avg_3m_balance: -5000.00  # 负数，系数取0.5，但结果为负→归零
        cgs_social_security:
          user_id: "TC_S02"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_S02"
          monthly_salary: 15000.00
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S02</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S02</sx_trace_id>
            <corp_id></corp_id>
            <corp_xy_num></corp_xy_num>
            <person_idtype>1010</person_idtype>
            <person_id></person_id>
            <person_name>测试用户</person_name>
            <bnk_no></bnk_no>
            <cp_code>8890</cp_code>
            <c_code>110110</c_code>
            <p_code>110000</p_code>
            <fr_psn_id></fr_psn_id>
            <fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "1"
        desc: 满足准入条件
      - path: "//credit_limit"
        op: eq
        value: "0.00"
        desc: "1×(-5)×15000×0.5=-37500<0，归零=0.00"
    notes: "准入但负资产：计算系数0.5，结果为负数后归零"

  # ── 用例3：不准入（工资恰好等于10000临界值）──────────────────────────
  - id: TC_MODEL001_S03
    name: "不准入-工资边界10000"
    category: 边界值
    priority: P0
    coverage_point: "边界值分析/月薪/临界值-10000（严格大于才准入）"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S03"
          user_level: 5
        account_balance:
          user_id: "TC_S03"
          avg_3m_balance: 100000.00
        cgs_social_security:
          user_id: "TC_S03"
          social_security_flag: 1   # 有社保，但工资不达标
        salary_summary:
          user_id: "TC_S03"
          monthly_salary: 10000.00  # 恰好等于10000，条件是>10000，所以不准入
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S03</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S03</sx_trace_id>
            <corp_id></corp_id>
            <corp_xy_num></corp_xy_num>
            <person_idtype>1010</person_idtype>
            <person_id></person_id>
            <person_name>测试用户</person_name>
            <bnk_no></bnk_no>
            <cp_code>8890</cp_code>
            <c_code>110110</c_code>
            <p_code>110000</p_code>
            <fr_psn_id></fr_psn_id>
            <fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "0"
        desc: 工资=10000不满足>10000，不准入
      - path: "//credit_limit"
        op: eq
        value: "0.00"
        desc: 不准入额度固定为0.00
    notes: "边界值：monthly_salary=10000（临界值，严格大于才准入）"

  # ── 用例4：等价类——用户等级最低值（等级1）─────────────────────────
  - id: TC_MODEL001_S04
    name: "等价类-用户等级1最低值"
    category: 等价类
    priority: P1
    coverage_point: "等价类/用户等级/有效类/等级1（最低）"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S04"
          user_level: 1              # 最低等级
        account_balance:
          user_id: "TC_S04"
          avg_3m_balance: 10000.00
        cgs_social_security:
          user_id: "TC_S04"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_S04"
          monthly_salary: 20000.00  # >10000，满足准入
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S04</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S04</sx_trace_id>
            <corp_id></corp_id>
            <corp_xy_num></corp_xy_num>
            <person_idtype>1010</person_idtype>
            <person_id></person_id>
            <person_name>测试用户</person_name>
            <bnk_no></bnk_no>
            <cp_code>8890</cp_code>
            <c_code>110110</c_code>
            <p_code>110000</p_code>
            <fr_psn_id></fr_psn_id>
            <fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "1"
        desc: 工资20000>10000 且 有社保，准入
      - path: "//credit_limit"
        op: eq
        value: "460000.00"
        desc: "额度=1×(10000÷1000)×20000×2.3=460000.00"
    notes: "等价类：user_level=1（最低有效等级），验证等级乘数最小场景"

  # ── 用例5：异常流程——无社保导致不准入 ────────────────────────────
  - id: TC_MODEL001_S05
    name: "异常流程-无社保不准入"
    category: 异常流程
    priority: P1
    coverage_point: "决策规则覆盖/准入条件/无社保-不满足准入"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S05"
          user_level: 3
        account_balance:
          user_id: "TC_S05"
          avg_3m_balance: 50000.00
        cgs_social_security:
          user_id: "TC_S05"
          social_security_flag: 0   # 无社保 → 不满足准入条件
        salary_summary:
          user_id: "TC_S05"
          monthly_salary: 30000.00  # 工资达标但无社保
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S05</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S05</sx_trace_id>
            <corp_id></corp_id>
            <corp_xy_num></corp_xy_num>
            <person_idtype>1010</person_idtype>
            <person_id></person_id>
            <person_name>测试用户</person_name>
            <bnk_no></bnk_no>
            <cp_code>8890</cp_code>
            <c_code>110110</c_code>
            <p_code>110000</p_code>
            <fr_psn_id></fr_psn_id>
            <fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "0"
        desc: 无社保不满足准入条件
      - path: "//credit_limit"
        op: eq
        value: "0.00"
        desc: 不准入额度固定为0.00，系数为0
    notes: "异常流程：social_security_flag=0（无社保），即使工资满足条件也无法准入，coefficient=0，额度归零"
