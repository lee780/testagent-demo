# MODEL_001 授信额度测算 — 接口测试用例样例（v2.0）
# 说明：此文件为 5 条示范用例，覆盖核心场景。Agent 需以此格式生成全量因子组合用例。
#
# ★ 与系统的关键匹配点：
#   - endpoint: /mock/model/score（被测系统真实地址）
#   - preconditions.db_setup 字段名必须与下方保持一致（本地DB指标）
#   - preconditions.external_setup 字段名对应外部接口挡板指标（必填，影响准入判断）
#   - assertions.path 使用 //tag 格式提取 XML 响应值
#   - credit_limit 公式：user_level × avg_3m_balance × monthly_salary × coefficient
#   - coefficient：准入且balance>1000→2.3；准入且0<balance≤1000→0.5；准入且balance≤0→0.2；不准入→0
#
# ★ 准入判断：6条全满足才准入
#   1. monthly_salary > 10000
#   2. social_security_flag = 1
#   3. card_status = "NORMAL"
#   4. id_check_result = "PASS"
#   5. is_black = false
#   6. recent_trans_amount > 0
#
# ★ 追溯字段说明：
#   - coverage_point：必填，格式"一级/二级/三级/具体覆盖点"
#     此字段用于测试报告中的覆盖分析树，证明每条用例来自明确的测试设计决策

suite:
  id: SUITE_MODEL001
  name: MODEL_001 授信额度模型接口测试
  model_id: MODEL_001
  endpoint: /mock/model/score
  method: POST
  content_type: application/xml

test_cases:

  # ── 用例1：正常准入，avg>1000，系数2.3 ──────────────────────────────────
  - id: TC_MODEL001_S01
    name: "正常准入-高资产-系数2.3"
    category: 正常流程
    priority: P0
    coverage_point: "决策规则覆盖/准入条件/六条全满足/高资产系数2.3"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S01"
          user_level: 2
        account_balance:
          user_id: "TC_S01"
          avg_3m_balance: 1500.00    # >1000，系数取 2.3
        cgs_social_security:
          user_id: "TC_S01"
          social_security_flag: 1   # 有社保
        salary_summary:
          user_id: "TC_S01"
          monthly_salary: 15000.00  # >10000，满足准入
      external_setup:               # 外部接口挡板配置（必填）
        card_status: "NORMAL"       # 借记卡状态正常（A00110001）
        recent_trans_amount: 5800.50  # 近30天有交易（A00110001）
        id_check_result: "PASS"     # 身份核验通过（A00110002）
        is_black: false             # 未进黑名单（A00110003）
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S01</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S01</sx_trace_id>
            <corp_id></corp_id>
            <corp_xy_num></corp_xy_num>
            <cst_id></cst_id>
            <id_type>1010</id_type>
            <person_id></person_id>
            <person_name>测试用户</person_name>
            <bnk_no></bnk_no>
            <cp_code>8890</cp_code>
            <qd_cd>R00</qd_cd>
            <c_code>110110</c_code>
            <p_code>110000</p_code>
            <fr_psn_id></fr_psn_id>
            <fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "1"
        desc: 六条准入条件全满足，准入
      - path: "//credit_limit"
        op: eq
        value: "103500000.00"
        desc: "额度=2×1500×15000×2.3=103500000.00"
    notes: "核心正常流程：六条准入全满足 + avg>1000 + 系数2.3"

  # ── 用例2：准入，0<avg≤1000，系数0.5 ────────────────────────────────────
  - id: TC_MODEL001_S02
    name: "正常准入-中等资产-系数0.5"
    category: 正常流程
    priority: P0
    coverage_point: "决策规则覆盖/计算系数/准入/中等资产0<avg≤1000系数0.5"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S02"
          user_level: 2
        account_balance:
          user_id: "TC_S02"
          avg_3m_balance: 500.00    # 0<avg≤1000，系数取 0.5
        cgs_social_security:
          user_id: "TC_S02"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_S02"
          monthly_salary: 15000.00
      external_setup:
        card_status: "NORMAL"
        recent_trans_amount: 3000.00
        id_check_result: "PASS"
        is_black: false
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S02</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S02</sx_trace_id>
            <corp_id></corp_id><corp_xy_num></corp_xy_num><cst_id></cst_id>
            <id_type>1010</id_type><person_id></person_id>
            <person_name>测试用户</person_name><bnk_no></bnk_no>
            <cp_code>8890</cp_code><qd_cd>R00</qd_cd>
            <c_code>110110</c_code><p_code>110000</p_code>
            <fr_psn_id></fr_psn_id><fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "1"
        desc: 满足准入
      - path: "//credit_limit"
        op: eq
        value: "7500000.00"
        desc: "额度=2×500×15000×0.5=7500000.00"
    notes: "准入 + 中等资产（0<avg≤1000）→ 系数0.5"

  # ── 用例3：准入，负资产，系数0.2，额度归零 ───────────────────────────────
  - id: TC_MODEL001_S03
    name: "准入-负资产-系数0.2-额度归零"
    category: 边界值
    priority: P0
    coverage_point: "决策规则覆盖/计算系数/准入/负资产系数0.2归零"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S03"
          user_level: 1
        account_balance:
          user_id: "TC_S03"
          avg_3m_balance: -5000.00  # ≤0，系数取0.2，但结果为负→归零
        cgs_social_security:
          user_id: "TC_S03"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_S03"
          monthly_salary: 15000.00
      external_setup:
        card_status: "NORMAL"
        recent_trans_amount: 1200.00
        id_check_result: "PASS"
        is_black: false
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S03</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S03</sx_trace_id>
            <corp_id></corp_id><corp_xy_num></corp_xy_num><cst_id></cst_id>
            <id_type>1010</id_type><person_id></person_id>
            <person_name>测试用户</person_name><bnk_no></bnk_no>
            <cp_code>8890</cp_code><qd_cd>R00</qd_cd>
            <c_code>110110</c_code><p_code>110000</p_code>
            <fr_psn_id></fr_psn_id><fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "1"
        desc: 满足准入（工资15000>10000，有社保，外部指标全通过）
      - path: "//credit_limit"
        op: eq
        value: "0.00"
        desc: "1×(-5000)×15000×0.2=-1500000<0，归零=0.00"
    notes: "准入但负资产：系数0.2，计算结果为负后归零"

  # ── 用例4：不准入——借记卡状态异常（外部指标阻断）──────────────────────
  - id: TC_MODEL001_S04
    name: "不准入-借记卡状态异常"
    category: 异常流程
    priority: P1
    coverage_point: "决策规则覆盖/准入条件/外部指标阻断/card_status异常不准入"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S04"
          user_level: 3
        account_balance:
          user_id: "TC_S04"
          avg_3m_balance: 5000.00
        cgs_social_security:
          user_id: "TC_S04"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_S04"
          monthly_salary: 20000.00
      external_setup:
        card_status: "ABNORMAL"     # 借记卡异常 → 不满足准入条件3
        recent_trans_amount: 8000.00
        id_check_result: "PASS"
        is_black: false
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S04</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S04</sx_trace_id>
            <corp_id></corp_id><corp_xy_num></corp_xy_num><cst_id></cst_id>
            <id_type>1010</id_type><person_id></person_id>
            <person_name>测试用户</person_name><bnk_no></bnk_no>
            <cp_code>8890</cp_code><qd_cd>R00</qd_cd>
            <c_code>110110</c_code><p_code>110000</p_code>
            <fr_psn_id></fr_psn_id><fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "0"
        desc: card_status=ABNORMAL 不满足准入条件3，不准入
      - path: "//credit_limit"
        op: eq
        value: "0.00"
        desc: 不准入额度固定为0.00
    notes: "外部指标阻断：card_status=ABNORMAL，DB指标全满足也无法准入"

  # ── 用例5：不准入——在黑名单（外部指标阻断）─────────────────────────────
  - id: TC_MODEL001_S05
    name: "不准入-命中黑名单"
    category: 异常流程
    priority: P1
    coverage_point: "决策规则覆盖/准入条件/外部指标阻断/is_black命中黑名单不准入"
    preconditions:
      db_setup:
        user_info:
          user_id: "TC_S05"
          user_level: 3
        account_balance:
          user_id: "TC_S05"
          avg_3m_balance: 8000.00
        cgs_social_security:
          user_id: "TC_S05"
          social_security_flag: 1
        salary_summary:
          user_id: "TC_S05"
          monthly_salary: 30000.00
      external_setup:
        card_status: "NORMAL"
        recent_trans_amount: 12000.00
        id_check_result: "PASS"
        is_black: true              # 命中黑名单 → 不满足准入条件5
    request:
      body: |
        <?xml version="1.0" encoding="utf-8"?>
        <REQUEST>
          <user_id>TC_S05</user_id>
          <model_id>MODEL_001</model_id>
          <channel>131</channel>
          <business_params>
            <sx_trace_id>TRACE_S05</sx_trace_id>
            <corp_id></corp_id><corp_xy_num></corp_xy_num><cst_id></cst_id>
            <id_type>1010</id_type><person_id></person_id>
            <person_name>测试用户</person_name><bnk_no></bnk_no>
            <cp_code>8890</cp_code><qd_cd>R00</qd_cd>
            <c_code>110110</c_code><p_code>110000</p_code>
            <fr_psn_id></fr_psn_id><fr_psn_name></fr_psn_name>
          </business_params>
        </REQUEST>
    assertions:
      - path: "//result_code"
        op: eq
        value: "0000"
        desc: 接口调用成功
      - path: "//admit_flag"
        op: eq
        value: "0"
        desc: is_black=true 命中黑名单，不满足准入条件5
      - path: "//credit_limit"
        op: eq
        value: "0.00"
        desc: 不准入额度固定为0.00
    notes: "外部指标阻断：is_black=true（命中黑名单），即使其他条件全满足也不准入"
